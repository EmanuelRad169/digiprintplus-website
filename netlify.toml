# netlify.toml - Web App Configuration (Project "main")

# Use Next.js Runtime for proper ISR/Standalone support  
[[plugins]]
  package = "@netlify/plugin-nextjs"

[build]
  # Enable corepack to activate pnpm, then install dependencies and build
  command = "corepack enable && corepack prepare pnpm@9.15.4 --activate && bash scripts/verify-netlify-runtime.sh && pnpm install --frozen-lockfile && cd apps/web && NODE_OPTIONS='--max-old-space-size=4096' pnpm run build"
  publish = "apps/web/.next"
  ignore = "git diff --quiet HEAD^ HEAD ./"

[functions]
  directory = "apps/web/netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20.19.1"
  PNPM_VERSION = "9.15.4"
  NETLIFY_USE_PNPM = "true"
  
  # IMPORTANT: Sensitive environment variables should be set in Netlify UI
  # Go to: Site settings → Environment variables → Add variables
  # 
  # Required variables to set in Netlify UI:
  # - NEXT_PUBLIC_SANITY_PROJECT_ID
  # - NEXT_PUBLIC_SANITY_DATASET
  # - NEXT_PUBLIC_SANITY_API_VERSION
  # - SANITY_API_TOKEN (⚠️ NEVER commit this to git!)
  # - NEXT_PUBLIC_SITE_URL
  # - NEXT_PUBLIC_SANITY_STUDIO_URL (optional)
  # - SANITY_REVALIDATE_SECRET (optional)
  # - SANITY_WEBHOOK_SECRET (optional)

# Increase build timeout
[build.processing]
  skip_processing = false

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets aggressively
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images for 1 year
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
  #  to = "/index.html"
  #  status = 200

  ## (optional) Settings for Netlify Dev
  ## https://github.com/netlify/cli/blob/main/docs/netlify-dev.md#project-detection
  #[dev]
  #  command = "yarn start" # Command to start your dev server
  #  port = 3000 # Port that the dev server will be listening on
  #  publish = "dist" # Folder with the static content for _redirect file

