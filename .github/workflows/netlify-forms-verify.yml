name: verify-netlify-forms

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    verify:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3
              with:
                  version: 9.15.4

            - name: Use Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "pnpm"

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Verify Forms Configuration
              run: pnpm --filter web verify:forms

            - name: Run Smoke Tests (Optional)
              if: ${{ env.LIVE_SITE_URL != '' }}
              env:
                  LIVE_SITE_URL: ${{ secrets.LIVE_SITE_URL }}
              run: pnpm --filter web smoke:forms
